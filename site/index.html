<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Servidor Nginx</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background-color: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      padding: 48px 56px;
      max-width: 560px;
      width: 90%;
      text-align: center;
    }

    .badge {
      display: inline-block;
      background-color: #e8f5e9;
      color: #2e7d32;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 2rem;
      color: #1a202c;
      margin-bottom: 16px;
      line-height: 1.3;
    }

    p {
      font-size: 1rem;
      color: #4a5568;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .stack {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .tag {
      background-color: #edf2ff;
      color: #3b5bdb;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 6px;
    }

    .tag.docker  { background-color: #e0f7fa; color: #00838f; }
    .tag.ansible { background-color: #fff8e1; color: #f57f17; }
    .tag.nginx   { background-color: #e8f5e9; color: #2e7d32; }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">Automatización DevOps</span>
    <h1>¡Hola desde Ansible! 🚀</h1>
    <p>
      Esta página fue desplegada automáticamente con <strong>Ansible</strong> sobre
      contenedores <strong>Docker</strong>, demostrando la automatización de
      infraestructura con herramientas modernas de DevOps.
    </p>
    <div class="stack">
      <span class="tag ansible">Ansible</span>
      <span class="tag docker">Docker</span>
      <span class="tag nginx">Nginx</span>
    </div>
  </div>
</body>
</html>
